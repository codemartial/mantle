<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<title>Metadater — macOS image metadata editor</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
/* Metadater — design tokens & base styles */

/* Dark theme — default */
:root,
[data-theme="dark"] {
  --bg-desktop:   oklch(0.14 0.005 250);
  --bg-window:    oklch(0.20 0.005 250);
  --bg-toolbar:   oklch(0.235 0.005 250);
  --bg-panel:     oklch(0.225 0.005 250);
  --bg-elev:      oklch(0.27 0.005 250);
  --bg-elev-hi:   oklch(0.32 0.005 250);
  --bg-input:     oklch(0.17 0.005 250);
  --bg-thumb:     oklch(0.24 0.005 250);
  --bg-stripe-a:  oklch(0.16 0.005 250);
  --bg-stripe-b:  oklch(0.18 0.005 250);
  --bg-toast:     oklch(0.22 0.005 250 / 0.92);

  --line-1:       oklch(0.30 0.005 250);
  --line-2:       oklch(0.34 0.005 250);
  --line-soft:    oklch(0.27 0.005 250 / 0.7);

  --fg:           oklch(0.96 0.005 250);
  --fg-mute:      oklch(0.74 0.005 250);
  --fg-dim:       oklch(0.58 0.005 250);
  --fg-faint:     oklch(0.46 0.005 250);

  --accent:       oklch(0.72 0.13 235);
  --accent-soft:  oklch(0.72 0.13 235 / 0.22);
  --accent-edge:  oklch(0.72 0.13 235 / 0.55);
  --accent-fg:    oklch(0.15 0.02 235);

  --chip-bg:      oklch(0.30 0.005 250);
  --chip-bg-some: oklch(0.30 0.005 250 / 0.42);
  --chip-border:  oklch(0.34 0.005 250);

  --shadow-window: 0 24px 60px -10px oklch(0 0 0 / 0.55), 0 8px 18px -6px oklch(0 0 0 / 0.4);

  --desktop-grad: radial-gradient(ellipse at 50% -10%, oklch(0.22 0.01 250) 0%, oklch(0.14 0.005 250) 55%, oklch(0.10 0.005 250) 100%);
}

[data-theme="light"] {
  --bg-desktop:   oklch(0.86 0.004 250);
  --bg-window:    oklch(0.985 0.002 250);
  --bg-toolbar:   oklch(0.955 0.002 250);
  --bg-panel:     oklch(0.97 0.002 250);
  --bg-elev:      oklch(0.94 0.002 250);
  --bg-elev-hi:   oklch(0.90 0.002 250);
  --bg-input:     oklch(1.0 0 0);
  --bg-thumb:     oklch(0.88 0.003 250);
  --bg-stripe-a:  oklch(0.93 0.002 250);
  --bg-stripe-b:  oklch(0.95 0.002 250);
  --bg-toast:     oklch(0.98 0.002 250 / 0.95);

  --line-1:       oklch(0.85 0.003 250);
  --line-2:       oklch(0.78 0.003 250);
  --line-soft:    oklch(0.88 0.003 250 / 0.8);

  --fg:           oklch(0.16 0.006 250);
  --fg-mute:      oklch(0.36 0.005 250);
  --fg-dim:       oklch(0.50 0.005 250);
  --fg-faint:     oklch(0.62 0.005 250);

  --accent:       oklch(0.55 0.17 250);
  --accent-soft:  oklch(0.55 0.17 250 / 0.16);
  --accent-edge:  oklch(0.55 0.17 250 / 0.55);
  --accent-fg:    oklch(0.99 0 0);

  --chip-bg:      oklch(0.92 0.003 250);
  --chip-bg-some: oklch(0.92 0.003 250 / 0.5);
  --chip-border:  oklch(0.82 0.003 250);

  --shadow-window: 0 24px 60px -10px oklch(0 0 0 / 0.25), 0 8px 18px -6px oklch(0 0 0 / 0.18);

  --desktop-grad: radial-gradient(ellipse at 50% -10%, oklch(0.92 0.004 250) 0%, oklch(0.86 0.004 250) 55%, oklch(0.78 0.004 250) 100%);
}

:root {

  /* Traffic-light dots — generic OS convention, original implementation */
  --tl-r:         oklch(0.68 0.18 28);
  --tl-y:         oklch(0.82 0.17 88);
  --tl-g:         oklch(0.74 0.18 142);

  /* Histogram trio */
  --hist-r:       oklch(0.65 0.14 28);
  --hist-g:       oklch(0.68 0.14 142);
  --hist-b:       oklch(0.68 0.14 245);

  --rad-window:   10px;
  --rad-card:     6px;
  --rad-chip:     4px;
  --rad-input:    5px;
}

* { box-sizing: border-box; }
html, body {
  margin: 0; padding: 0;
  background: var(--bg-desktop);
  color: var(--fg);
  font-family: "Geist", ui-sans-serif, system-ui, sans-serif;
  font-size: 12px;
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
  height: 100%;
}

.mono { font-family: "Geist Mono", ui-monospace, "SFMono-Regular", monospace; }

/* Scene scaler — content sits at fixed 1280×800; CSS scales to viewport */
.scene-wrap {
  position: fixed; inset: 0;
  display: grid; place-items: center;
  background: var(--bg-desktop);
}
.scene {
  width: 1280px; height: 800px;
  position: relative;
  transform-origin: center center;
  overflow: hidden;
  background: var(--desktop-grad);
}

/* Menubar */
.menubar {
  position: absolute; top: 0; left: 0; right: 0; height: 24px;
  display: flex; align-items: center; gap: 18px;
  padding: 0 14px;
  background: var(--bg-toolbar);
  backdrop-filter: blur(20px) saturate(140%);
  border-bottom: 0.5px solid var(--line-2);
  font-size: 12px; color: var(--fg);
  z-index: 10;
}
.menubar .mb-app { font-weight: 600; letter-spacing: 0.01em; white-space: nowrap; }
.menubar .mb-item { color: oklch(0.92 0.005 250); cursor: default; white-space: nowrap; }
.menubar .mb-glyph { line-height: 1; display: inline-flex; align-items: center; }
.menubar .mb-spacer { flex: 1; }
.menubar .mb-right {
  display: flex; align-items: center; gap: 14px;
  color: var(--fg-mute); font-size: 11.5px;
  font-variant-numeric: tabular-nums;
  white-space: nowrap;
}
.menubar .mb-glyph { display: inline-block; }

/* App window */
.window {
  position: absolute;
  left: 50%; top: 56%;
  transform: translate(-50%, -50%);
  width: 940px; height: 500px;
  background: var(--bg-window);
  border-radius: var(--rad-window);
  border: 0.5px solid oklch(0 0 0 / 0.6);
  box-shadow:
    0 0 0 0.5px oklch(0 0 0 / 0.35),
    var(--shadow-window),
    inset 0 0.5px 0 oklch(1 0 0 / 0.06);
  overflow: hidden;
  display: flex; flex-direction: column;
}

/* Toolbar */
.titlebar {
  height: 44px; flex: 0 0 44px;
  display: flex; align-items: center;
  padding: 0 12px;
  gap: 14px;
  background: var(--bg-toolbar);
  border-bottom: 0.5px solid var(--line-1);
  position: relative;
}
.tl-group { display: flex; align-items: center; gap: 7px; }
.tl-dot {
  width: 11px; height: 11px; border-radius: 50%;
  border: 0.5px solid oklch(0 0 0 / 0.4);
  box-shadow: inset 0 0 0 0.5px oklch(1 0 0 / 0.15);
}
.tl-dot.r { background: var(--tl-r); }
.tl-dot.y { background: var(--tl-y); }
.tl-dot.g { background: var(--tl-g); }

.tb-divider { width: 1px; height: 18px; background: var(--line-1); }

.tb-btn {
  height: 24px; padding: 0 9px;
  display: inline-flex; align-items: center; gap: 6px;
  background: var(--bg-elev);
  border: 0.5px solid var(--line-2);
  border-radius: 5px;
  color: var(--fg);
  font-size: 12px;
  cursor: default;
  box-shadow: inset 0 0.5px 0 oklch(1 0 0 / 0.06);
  white-space: nowrap;
}
.tb-btn:hover { background: var(--bg-elev-hi); }
.tb-btn.icon { padding: 0; width: 26px; justify-content: center; }
.tb-btn.primary {
  background: var(--accent);
  color: var(--accent-fg);
  border-color: var(--accent);
  font-weight: 600;
}
.tb-btn .caret { opacity: 0.55; font-size: 9px; }

.tb-search {
  display: flex; align-items: center; gap: 6px;
  height: 24px; padding: 0 8px;
  width: 180px;
  background: var(--bg-input);
  border: 0.5px solid var(--line-1);
  border-radius: 5px;
  color: var(--fg-mute);
}
.tb-search input {
  background: none; border: 0; outline: none;
  color: var(--fg); font: inherit; flex: 1;
  font-size: 12px;
}
.tb-search input::placeholder { color: var(--fg-faint); }

.tb-segment {
  display: inline-flex;
  background: var(--bg-elev);
  border: 0.5px solid var(--line-2);
  border-radius: 5px;
  height: 24px;
  padding: 1.5px;
  gap: 1px;
}
.tb-segment button {
  appearance: none; border: 0;
  background: transparent;
  color: var(--fg-mute);
  font: inherit;
  width: 26px; height: 100%;
  border-radius: 3.5px;
  cursor: default;
  display: inline-flex; align-items: center; justify-content: center;
}
.tb-segment button.on {
  background: var(--bg-elev-hi);
  color: var(--fg);
  box-shadow: inset 0 0.5px 0 oklch(1 0 0 / 0.08);
}

.tb-title {
  position: absolute; left: 50%; top: 0; height: 100%;
  transform: translateX(-50%);
  display: flex; align-items: center; gap: 6px;
  color: var(--fg-mute); font-size: 11.5px;
  pointer-events: none;
  white-space: nowrap;
  max-width: 360px;
  overflow: hidden;
  text-overflow: ellipsis;
}
.tb-title > * { white-space: nowrap; flex-shrink: 0; }
.tb-title .path { overflow: hidden; text-overflow: ellipsis; flex-shrink: 1; min-width: 0; }
.tb-title b { color: var(--fg); font-weight: 600; }
.tb-title .chev { color: var(--fg-faint); }

/* Body grid */
.body {
  flex: 1;
  display: grid;
  grid-template-columns: 252px 1fr 252px;
  min-height: 0;
  background: var(--bg-window);
}
.col {
  min-height: 0;
  display: flex; flex-direction: column;
  overflow: hidden;
}
.col-left  { border-right: 0.5px solid var(--line-1); }
.col-right { border-left:  0.5px solid var(--line-1); }

/* Browser */
.browser-head {
  height: 28px;
  display: flex; align-items: center;
  padding: 0 12px;
  font-size: 11px;
  color: var(--fg-mute);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  background: var(--bg-panel);
  border-bottom: 0.5px solid var(--line-soft);
  justify-content: space-between;
}
.browser-head .count { color: var(--fg-dim); font-variant-numeric: tabular-nums; }

.browser-scroll {
  flex: 1;
  overflow-y: auto;
  padding: 8px;
}
.browser-scroll::-webkit-scrollbar { width: 6px; }
.browser-scroll::-webkit-scrollbar-thumb {
  background: var(--line-2); border-radius: 3px;
}
.browser-scroll::-webkit-scrollbar-track { background: transparent; }

/* Grid */
.grid-wrap {
  display: grid;
  gap: 8px;
}
.grid-wrap.density-s { grid-template-columns: repeat(3, 1fr); gap: 6px; }
.grid-wrap.density-m { grid-template-columns: repeat(2, 1fr); gap: 8px; }
.grid-wrap.density-l { grid-template-columns: 1fr; gap: 10px; }

.thumb {
  position: relative;
  border-radius: var(--rad-card);
  overflow: hidden;
  background: var(--bg-thumb);
  border: 1.5px solid transparent;
  cursor: default;
  aspect-ratio: 3 / 2;
  transition: border-color 80ms linear;
}
.thumb svg { display: block; width: 100%; height: 100%; }
.thumb.selected { border-color: var(--accent); }
.thumb.batch    { border-color: oklch(0.72 0.13 235 / 0.7); }
.thumb .badge {
  position: absolute;
  top: 4px; right: 4px;
  height: 16px; min-width: 16px;
  padding: 0 4px;
  background: oklch(0 0 0 / 0.55);
  border-radius: 8px;
  font-size: 10px;
  color: oklch(1 0 0 / 0.95);
  display: inline-flex; align-items: center; justify-content: center;
  backdrop-filter: blur(6px);
}
.thumb .badge.flag {
  background: var(--accent);
  color: var(--accent-fg);
  font-weight: 700;
}
.thumb .stamp {
  position: absolute; left: 4px; bottom: 3px;
  font-size: 9px;
  color: oklch(1 0 0 / 0.85);
  text-shadow: 0 1px 2px oklch(0 0 0 / 0.6);
  letter-spacing: 0.02em;
}
.thumb.density-s .stamp { display: none; }

/* List */
.list-wrap { display: flex; flex-direction: column; gap: 1px; }
.list-row {
  display: grid;
  grid-template-columns: 36px 1fr auto;
  gap: 8px;
  align-items: center;
  padding: 4px 6px;
  border-radius: 4px;
  cursor: default;
}
.list-row:hover { background: oklch(1 0 0 / 0.03); }
.list-row.selected { background: var(--accent-soft); }
.list-row .lthumb {
  width: 36px; height: 24px;
  border-radius: 3px; overflow: hidden;
  background: var(--bg-thumb);
}
.list-row .lthumb svg { width: 100%; height: 100%; display: block; }
.list-row .lname { font-size: 11.5px; color: var(--fg); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.list-row .lmeta { font-size: 10.5px; color: var(--fg-faint); font-variant-numeric: tabular-nums; }

/* Center (preview + caption) */
.center {
  display: grid;
  grid-template-rows: 1fr auto;
  min-height: 0;
}
.preview-wrap {
  position: relative;
  display: grid; place-items: center;
  background:
    repeating-linear-gradient(0deg, var(--bg-stripe-a) 0 14px, var(--bg-stripe-b) 14px 28px);
  overflow: hidden;
  min-height: 0;
}
/* Preview wrap — tighter padding */
.preview-frame {
  position: relative;
  max-width: calc(100% - 16px);
  max-height: calc(100% - 16px);
  aspect-ratio: 3 / 2;
  background: var(--bg-thumb);
  border-radius: 4px;
  box-shadow:
    0 0 0 0.5px oklch(0 0 0 / 0.5),
    0 18px 40px -10px oklch(0 0 0 / 0.55);
  overflow: hidden;
}
.preview-frame svg { display: block; width: 100%; height: 100%; }
.preview-corners {
  position: absolute; inset: 8px;
  pointer-events: none;
}
.preview-corners .c {
  position: absolute; width: 10px; height: 10px;
  border: 1px solid oklch(1 0 0 / 0.25);
}
.preview-corners .tl { top: 0; left: 0; border-right: 0; border-bottom: 0; }
.preview-corners .tr { top: 0; right: 0; border-left: 0; border-bottom: 0; }
.preview-corners .bl { bottom: 0; left: 0; border-right: 0; border-top: 0; }
.preview-corners .br { bottom: 0; right: 0; border-left: 0; border-top: 0; }

.preview-toolbar {
  position: absolute; left: 12px; bottom: 10px;
  display: flex; gap: 6px;
  padding: 4px;
  background: oklch(0 0 0 / 0.45);
  backdrop-filter: blur(10px);
  border-radius: 6px;
  border: 0.5px solid oklch(1 0 0 / 0.08);
}
.preview-toolbar button {
  appearance: none; border: 0;
  background: transparent;
  color: oklch(1 0 0 / 0.7);
  width: 22px; height: 22px;
  display: inline-flex; align-items: center; justify-content: center;
  border-radius: 4px;
  font-family: "Geist Mono", monospace;
  font-size: 11px;
  cursor: default;
}
.preview-toolbar button:hover { background: oklch(1 0 0 / 0.1); color: #fff; }
.preview-zoom {
  position: absolute; right: 12px; bottom: 10px;
  padding: 3px 7px;
  background: oklch(0 0 0 / 0.45);
  backdrop-filter: blur(10px);
  border: 0.5px solid oklch(1 0 0 / 0.08);
  border-radius: 6px;
  font-family: "Geist Mono", monospace;
  font-size: 10.5px;
  color: oklch(1 0 0 / 0.75);
}

/* Caption block */
.caption-block {
  background: var(--bg-panel);
  border-top: 0.5px solid var(--line-1);
  padding: 9px 12px 10px;
  display: flex; flex-direction: column; gap: 7px;
  min-height: 0;
}
.headline-row {
  display: flex; align-items: center; gap: 8px;
}
.field-label {
  font-size: 10px;
  color: var(--fg-dim);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  flex: 0 0 56px;
}
.headline-input {
  flex: 1;
  background: var(--bg-input);
  border: 0.5px solid var(--line-1);
  border-radius: var(--rad-input);
  padding: 4px 8px;
  height: 24px;
  color: var(--fg);
  font: inherit;
  font-size: 12px;
  outline: none;
  white-space: nowrap;
  overflow-x: auto;
  overflow-y: hidden;
}
.headline-input:focus { border-color: var(--accent-edge); box-shadow: 0 0 0 2px var(--accent-soft); }
.glyph-count {
  font-family: "Geist Mono", monospace;
  font-size: 10px;
  color: var(--fg-faint);
  font-variant-numeric: tabular-nums;
  flex: 0 0 auto;
}
.glyph-count.warn { color: oklch(0.78 0.14 60); }
.glyph-count.over { color: oklch(0.68 0.18 28); }

.caption-input-row {
  display: flex; gap: 8px;
  flex: 1; min-height: 0;
}
.caption-input {
  flex: 1;
  background: var(--bg-input);
  border: 0.5px solid var(--line-1);
  border-radius: var(--rad-input);
  padding: 6px 8px;
  color: var(--fg);
  font: inherit;
  font-size: 12px;
  resize: none;
  outline: none;
  line-height: 1.5;
}
.caption-input:focus { border-color: var(--accent-edge); box-shadow: 0 0 0 2px var(--accent-soft); }
.caption-meta {
  display: flex; flex-direction: column; align-items: flex-end;
  justify-content: space-between;
  font-family: "Geist Mono", monospace;
  font-size: 10px;
  color: var(--fg-faint);
}

/* Right metadata panel */
.meta-panel {
  display: flex; flex-direction: column;
  overflow: hidden;
}
.meta-tabs {
  display: flex; align-items: stretch;
  height: 28px;
  background: var(--bg-panel);
  border-bottom: 0.5px solid var(--line-soft);
  padding: 0 6px;
  gap: 0;
}
.meta-tab {
  flex: 1;
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 11px;
  color: var(--fg-mute);
  cursor: default;
  border-bottom: 1.5px solid transparent;
  margin-bottom: -0.5px;
}
.meta-tab.on { color: var(--fg); border-bottom-color: var(--accent); }

.meta-scroll {
  flex: 1; min-height: 0;
  overflow-y: auto;
  padding: 10px 12px 14px;
  display: flex; flex-direction: column; gap: 12px;
}
.meta-scroll::-webkit-scrollbar { width: 6px; }
.meta-scroll::-webkit-scrollbar-thumb { background: var(--line-2); border-radius: 3px; }

.section { display: flex; flex-direction: column; gap: 6px; }
.section-title {
  font-size: 10px;
  color: var(--fg-dim);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  display: flex; align-items: center; justify-content: space-between;
  white-space: nowrap;
}
.section-title .edit {
  font-size: 10px;
  color: var(--accent);
  text-transform: none;
  letter-spacing: 0;
  cursor: default;
}

.kv-list { display: grid; grid-template-columns: auto 1fr; gap: 3px 12px; }
.kv-list dt {
  color: var(--fg-dim);
  font-size: 11px;
  white-space: nowrap;
}
.kv-list dd {
  margin: 0;
  color: var(--fg);
  font-size: 11px;
  font-family: "Geist Mono", monospace;
  font-variant-numeric: tabular-nums;
  text-align: right;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* Histogram */
.histo {
  height: 48px;
  background: oklch(0.14 0.005 250);
  border: 0.5px solid var(--line-1);
  border-radius: 4px;
  position: relative;
  overflow: hidden;
  padding: 4px 6px 4px;
}
.histo svg { width: 100%; height: 100%; display: block; }
.histo svg path { mix-blend-mode: screen; }
.histo-axis {
  display: flex; justify-content: space-between;
  font-family: "Geist Mono", monospace;
  font-size: 9px;
  color: var(--fg-faint);
  margin-top: 3px;
  padding: 0 1px;
}

/* Map */
.map {
  position: relative;
  height: 110px;
  border-radius: 5px;
  overflow: hidden;
  border: 0.5px solid var(--line-1);
  background: var(--bg-input);
}
.map svg { display: block; width: 100%; height: 100%; }
.map .map-pin {
  position: absolute; left: 50%; top: 50%;
  transform: translate(-50%, -100%);
  pointer-events: none;
  color: var(--accent);
}
.map .map-pin .pin-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  background: var(--accent);
  border: 1.5px solid oklch(0.95 0.005 250);
  box-shadow: 0 4px 10px oklch(0 0 0 / 0.5);
}
.map .map-pin .pin-pulse {
  position: absolute; left: 50%; top: 50%;
  transform: translate(-50%, -50%);
  width: 22px; height: 22px;
  border-radius: 50%;
  background: var(--accent);
  opacity: 0.18;
  animation: pulse 5s ease-out infinite;
}
.map .map-pin .pin-cone {
  position: absolute; left: 50%; top: 50%;
  width: 56px; height: 56px;
  margin-left: -28px; margin-top: -28px;
  pointer-events: none;
  transform-origin: 50% 50%;
}
@keyframes pulse {
  0%   { transform: translate(-50%, -50%) scale(0.7); opacity: 0.20; }

.geo-row {

.geo-cell {
  display: flex; align-items: stretch;

  border: 0.5px solid var(--line-1);
  border-radius: 4px;
  overflow: hidden;
}
.geo-cell:focus-within { border-color: var(--accent-edge); box-shadow: 0 0 0 1px var(--accent-soft); }

  flex: 1;
  background: transparent;
  border: 0; outline: 0;
  color: var(--fg);
  font: inherit;
  font-family: "Geist Mono", monospace;
  font-size: 11px;
  padding: 4px 4px 4px 7px;
  min-width: 0;
}
.geo-cell .hemi {
  flex: 0 0 auto;
  display: inline-flex; align-items: center; justify-content: center;
  padding: 0 7px;
  font-family: "Geist Mono", monospace;
  font-size: 10.5px;
  color: var(--fg-dim);
  border-left: 0.5px solid var(--line-1);
  background: var(--bg-stripe-a);
  min-width: 22px;
  user-select: none;
  pointer-events: none;
}
.geo-cell.invalid { border-color: oklch(0.65 0.16 28 / 0.5); }

.place-line {
  display: flex; align-items: center; gap: 6px;
  font-size: 11px; color: var(--fg-dim);
  margin-top: 4px;
  flex-wrap: wrap;
}
.place-line .alt {
  display: inline-flex; align-items: center; gap: 3px;
  color: var(--fg-mute);
  font-family: "Geist Mono", monospace;
  font-size: 10.5px;
}
.place-line .alt svg { opacity: 0.7; }
.place-line .dim-sep { color: var(--fg-faint); }

/* Keyword chips */
.chips {
  display: flex; flex-wrap: wrap; gap: 4px;
  background: var(--bg-input);
  border: 0.5px solid var(--line-1);
  border-radius: var(--rad-input);
  padding: 5px 6px;
  min-height: 28px;
  align-items: flex-start;
}
.chip {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 1px 2px 1px 7px;
  background: var(--chip-bg);
  border: 0.5px solid var(--chip-border);
  border-radius: var(--rad-chip);
  color: var(--fg);
  font-size: 11px;
  line-height: 16px;
  height: 18px;
}
.chip.some {
  background: var(--chip-bg-some);
  border-style: dashed;
  color: var(--fg-mute);
}
.chip .x {
  display: inline-flex; align-items: center; justify-content: center;
  width: 14px; height: 14px;
  border-radius: 3px;
  color: var(--fg-dim);
  cursor: default;
  font-size: 12px;
  line-height: 1;
}
.chip .x:hover { background: oklch(1 0 0 / 0.08); color: var(--fg); }
.chip-input {
  border: 0; outline: none; background: transparent;
  color: var(--fg); font: inherit;
  font-size: 11px;
  min-width: 60px;
  height: 18px;
  padding: 0 4px;
  flex: 1;
}
.chip-input::placeholder { color: var(--fg-faint); }

/* Status bar */
.statusbar {
  height: 24px; flex: 0 0 24px;
  display: flex; align-items: center;
  padding: 0 12px;
  gap: 12px;
  background: var(--bg-toolbar);
  border-top: 0.5px solid var(--line-1);
  font-size: 11px;
  color: var(--fg-dim);
  white-space: nowrap;
  overflow: hidden;
}
.statusbar > span { white-space: nowrap; }
.statusbar .sep { opacity: 0.4; }
.statusbar .right { margin-left: auto; display: flex; gap: 14px; align-items: center; }
.statusbar .dirty {
  display: inline-flex; align-items: center; gap: 5px;
  color: oklch(0.78 0.14 60);
}
.statusbar .dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: oklch(0.78 0.14 60);
  box-shadow: 0 0 6px oklch(0.78 0.14 60 / 0.6);
}

/* Empty state */
.empty {
  flex: 1;
  display: grid; place-items: center;
  text-align: center;
  color: var(--fg-mute);
  background:
    repeating-linear-gradient(0deg, var(--bg-stripe-a) 0 14px, var(--bg-stripe-b) 14px 28px);
}
.empty-card {
  max-width: 420px;
  display: flex; flex-direction: column; align-items: center; gap: 14px;
  padding: 24px;
}
.empty-icon {
  width: 64px; height: 64px;
  border: 1px dashed var(--line-2);
  border-radius: 14px;
  display: grid; place-items: center;
  color: var(--fg-dim);
}
.empty-title { font-size: 14px; color: var(--fg); font-weight: 600; }
.empty-sub { color: var(--fg-dim); line-height: 1.55; font-size: 12px; }
.empty-actions { display: flex; gap: 8px; margin-top: 4px; }

/* Multi-select bar */
.batchbar {
  position: absolute; left: 50%; bottom: 36px;
  transform: translateX(-50%);
  display: flex; align-items: center; gap: 10px;
  padding: 6px 8px 6px 14px;
  background: var(--bg-toast);
  border: 0.5px solid var(--line-2);
  backdrop-filter: blur(16px);
  border-radius: 10px;
  box-shadow: 0 14px 30px -8px oklch(0 0 0 / 0.6);
  z-index: 5;
}
.batchbar .count {
  font-weight: 600;
  font-size: 12px;
}
.batchbar .sep { width: 1px; height: 16px; background: var(--line-2); }
.batchbar .action {
  font-size: 11.5px;
  color: var(--fg);
  padding: 3px 8px;
  border-radius: 4px;
  cursor: default;
}
.batchbar .action:hover { background: oklch(1 0 0 / 0.06); }
.batchbar .action.primary { color: var(--accent); }
.batchbar .action.danger { color: oklch(0.7 0.16 28); }

/* Batch grid mode */
.batch-overlay {
  position: relative;
  display: grid; place-items: center;
  flex: 1;
  background:
    repeating-linear-gradient(0deg, var(--bg-stripe-a) 0 14px, var(--bg-stripe-b) 14px 28px);
  text-align: center;
  padding: 24px;
}
.batch-stack {
  position: relative;
  width: 320px; height: 220px;
}
.batch-stack .card {
  position: absolute; inset: 0;
  background: var(--bg-thumb);
  border-radius: 6px;
  box-shadow: 0 12px 30px -8px oklch(0 0 0 / 0.55);
  overflow: hidden;
}
.batch-stack .card svg { width: 100%; height: 100%; display: block; }
.batch-stack .card:nth-child(1) { transform: rotate(-4deg) translate(-22px, 8px); }
.batch-stack .card:nth-child(2) { transform: rotate(2deg) translate(10px, -6px); }
.batch-stack .card:nth-child(3) { transform: rotate(-1deg) translate(2px, 4px); }
.batch-label {
  margin-top: 18px;
  color: var(--fg-mute);
}
.batch-label b { color: var(--fg); font-weight: 600; }

/* Utility */
.row-h { display: flex; align-items: center; gap: 8px; }
.spacer { flex: 1; }
.muted { color: var(--fg-mute); }
.dim { color: var(--fg-dim); }
.faint { color: var(--fg-faint); }

.dock-hint {
  position: absolute; left: 50%; bottom: 8px;
  transform: translateX(-50%);
  display: flex; gap: 10px;
  padding: 6px 14px;
  background: var(--bg-toast);
  border: 0.5px solid var(--line-2);
  backdrop-filter: blur(16px);
  border-radius: 12px;
  z-index: 4;
}
.dock-hint .di {
  width: 22px; height: 22px; border-radius: 5px;
  background: var(--bg-elev-hi);
  border: 0.5px solid var(--line-2);
}
.dock-hint .di.app {
  background: linear-gradient(160deg, var(--accent), oklch(0.5 0.13 235));
  position: relative;
}
.dock-hint .di.app::after {
  content: "";
  position: absolute; left: 50%; bottom: -6px;
  transform: translateX(-50%);
  width: 3px; height: 3px; border-radius: 50%;
  background: oklch(1 0 0 / 0.7);
}


/* ─────────────────────────────────────────────────────────────────────────
   Date / time / TZ editor
   ───────────────────────────────────────────────────────────────────────── */
.date-editor {
  display: flex; align-items: center;
  flex-wrap: wrap;
  gap: 2px;
  font-family: "Geist Mono", monospace;
  font-size: 12px;
  color: var(--fg);
}
.date-seg {
  background: transparent;
  border: 0;
  outline: 0;
  color: var(--fg);
  font: inherit;
  padding: 2px 3px;
  border-radius: 3px;
  text-align: center;
  font-variant-numeric: tabular-nums;
}
.date-seg.y { width: 36px; }
.date-seg.m, .date-seg.d,
.date-seg.h, .date-seg.i, .date-seg.s { width: 22px; }
.date-seg:hover { background: var(--bg-elev); }
.date-seg:focus { background: var(--bg-input); box-shadow: inset 0 0 0 0.5px var(--accent-edge); }
.date-pad { width: 8px; display: inline-block; }
.date-sep { color: var(--fg-faint); }

.date-tz {
  appearance: none;
  background: var(--bg-elev);
  border: 0.5px solid var(--line-1);
  border-radius: 4px;
  color: var(--fg);
  font: inherit;
  font-family: "Geist Mono", monospace;
  font-size: 11px;
  padding: 2px 22px 2px 8px;
  margin-left: 6px;
  background-image:

    linear-gradient(135deg, currentColor 50%, transparent 50%);
  background-position: calc(100% - 11px) 50%, calc(100% - 7px) 50%;
  background-size: 4px 4px;
  background-repeat: no-repeat;
  color: var(--fg);
}

.date-shift {
  display: flex; align-items: center; gap: 6px;
  margin-top: 6px;
  padding: 6px 8px;
  background: var(--bg-input);
  border: 0.5px dashed var(--line-1);
  border-radius: 4px;
  font-size: 11px;
  color: var(--fg-mute);
  white-space: nowrap;
  flex-wrap: nowrap;
}
.date-shift input {
  width: 36px;
  background: transparent;
  border: 0;
  outline: 0;
  font: inherit;
  font-family: "Geist Mono", monospace;
  font-size: 12px;
  color: var(--fg);
  text-align: center;
  border-bottom: 0.5px solid var(--line-2);

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', noDeckControls = false, children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  // Auto-inject a rail toggle when a <deck-stage> is on the page. The
  // toggle drives the deck's per-viewer _railVisible via window message;
  // state is mirrored from the same localStorage key the deck reads so
  // the control reflects reality across reloads. The mechanism is the
  // message — authors who want custom placement can post it directly
  // and pass noDeckControls to suppress this one.
  const hasDeckStage = React.useMemo(
    () => typeof document !== 'undefined' && !!document.querySelector('deck-stage'),
    [],
  );
  // deck-stage enables its rail in connectedCallback, but this panel can
  // mount before that element has upgraded. The initial read catches the
  // common case; the listener covers mounting first. (Older deck-stage.js
  // copies still wait for the host's __omelette_rail_enabled postMessage —
  // same listener handles those.)
  const [railEnabled, setRailEnabled] = React.useState(
    () => hasDeckStage && !!document.querySelector('deck-stage')?._railEnabled,
  );
  React.useEffect(() => {
    if (!hasDeckStage || railEnabled) return undefined;
    const onMsg = (e) => {
      if (e.data && e.data.type === '__omelette_rail_enabled') setRailEnabled(true);
    };
    window.addEventListener('message', onMsg);
    return () => window.removeEventListener('message', onMsg);
  }, [hasDeckStage, railEnabled]);
  const [railVisible, setRailVisible] = React.useState(() => {
    try { return localStorage.getItem('deck-stage.railVisible') !== '0'; } catch (e) { return true; }
  });
  const toggleRail = (on) => {
    setRailVisible(on);
    window.postMessage({ type: '__deck_rail_visible', on }, '*');
  };
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-noncommentable=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
          {hasDeckStage && railEnabled && !noDeckControls && (
            <TweakSection label="Deck">
              <TweakToggle label="Thumbnail rail" value={railVisible} onChange={toggleRail} />
            </TweakSection>
          )}
        </div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

  </script>

  <script type="text/babel" data-presets="react">
// Procedural thumbnail / preview SVG generator.
// Renders a distinguishable "photograph" from a photo data object
// without pretending to be a real image. Each photo's `sky`, `land`,
// `accent` + scene flags drive what gets composed.

function PhotoSVG({ photo, big = false }) {
  const id = "g_" + photo.id + (big ? "_b" : "");
  const sky = photo.sky || { from: "#3a4a5a", to: "#1a2230" };
  const land = photo.land || "#0c1116";
  const horizon = big ? 62 : 64; // % from top
  return (
    <svg viewBox="0 0 300 200" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id={id + "_sky"} x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stopColor={sky.from} />
          <stop offset="1" stopColor={sky.to} />
        </linearGradient>
        <linearGradient id={id + "_land"} x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stopColor={land} />
          <stop offset="1" stopColor="#000" stopOpacity="0.65" />
        </linearGradient>
        {photo.aurora && (
          <linearGradient id={id + "_aur"} x1="0" y1="0" x2="1" y2="0">
            <stop offset="0"   stopColor="#2aff8c" stopOpacity="0" />
            <stop offset="0.3" stopColor="#3affa8" stopOpacity="0.85" />
            <stop offset="0.6" stopColor="#aaffd0" stopOpacity="0.7" />
            <stop offset="1"   stopColor="#2aaaff" stopOpacity="0" />
          </linearGradient>
        )}
      </defs>
      {/* sky */}
      <rect width="300" height="200" fill={`url(#${id}_sky)`} />

      {/* aurora ribbons */}
      {photo.aurora && (
        <g opacity="0.85">
          <path d="M -10 60 C 60 30, 120 90, 180 50 S 280 80, 320 40 L 320 78 C 280 110, 220 70, 150 100 S 60 70, -10 95 Z"
                fill={`url(#${id}_aur)`} />
          <path d="M -10 96 C 80 70, 140 130, 220 95 S 320 110, 320 100 L 320 124 C 240 150, 160 110, 80 138 S -10 120, -10 120 Z"
                fill={`url(#${id}_aur)`} opacity="0.6" />
        </g>
      )}

      {/* stars */}
      {photo.stars && (
        <g fill="#ffffff" opacity="0.85">
          {[[22,18],[44,32],[80,12],[120,28],[160,16],[200,38],[240,22],[270,46],[60,52],[180,8],[105,8],[230,8]].map(([x,y],i)=>(
            <circle key={i} cx={x} cy={y} r={0.7 + (i%3)*0.3} />
          ))}
        </g>
      )}

      {/* sun / moon disc */}
      {photo.sun && (
        <circle cx={photo.sun.x * 3} cy={photo.sun.y * 2} r={photo.sun.r} fill={photo.sun.color} opacity="0.85" />
      )}

      {/* land horizon */}
      <path d={`M 0 ${horizon * 2} L 18 ${horizon * 2 - 4} L 46 ${horizon * 2 + 2} L 74 ${horizon * 2 - 8} L 110 ${horizon * 2 + 4} L 150 ${horizon * 2 - 12} L 190 ${horizon * 2 + 6} L 232 ${horizon * 2 - 2} L 268 ${horizon * 2 + 8} L 300 ${horizon * 2 - 4} L 300 200 L 0 200 Z`}
            fill={`url(#${id}_land)`} />

      {/* basalt stacks for Reynisfjara-style scene */}

      {/* waterfall */}

          <rect x="124" y="40" width="3" height="100" fill="#fff" opacity="0.5" />
          <rect x="148" y="40" width="2" height="100" fill="#fff" opacity="0.4" />

          <ellipse cx="150" cy="142" rx="46" ry="6" fill="#fff" opacity="0.55" />
          <path d="M 110 60 Q 150 -10 190 60 L 110 60" fill="rgba(255,200,150,0.18)" />
        </g>
      )}

      {/* ice cave arch */}
      {photo.cave && (
        <g>
          <path d="M 0 200 L 0 70 Q 150 -20 300 70 L 300 200 Z" fill="#1a2a3a" />
          <path d="M 30 200 L 30 100 Q 150 30 270 100 L 270 200 Z" fill="#3a86b8" />
          <path d="M 60 200 L 60 130 Q 150 70 240 130 L 240 200 Z" fill="#7ccae8" opacity="0.85" />
          <path d="M 90 200 L 90 160 Q 150 110 210 160 L 210 200 Z" fill="#e0f4ff" opacity="0.55" />
        </g>
      )}

      {/* steam plumes */}
      {photo.steam && (
        <g fill="#e8dcc8" opacity="0.55">

          <ellipse cx="150" cy="84"  rx="34" ry="18" />

      {/* puffin silhouette */}

          <ellipse cx="180" cy="130" rx="22" ry="14" fill="#f0eee8" />

      {/* moss field */}
      {photo.moss && (
        <g fill="#3a5a3a" opacity="0.85">
          {[...Array(40)].map((_, i) => (

      {/* harbor boats */}

        </g>

      {/* crater rim */}
      {photo.crater && (
        <g>
          <ellipse cx="150" cy="170" rx="180" ry="30" fill="#2a1c1c" />
          <ellipse cx="150" cy="166" rx="160" ry="24" fill="#3a2828" />
          <ellipse cx="150" cy="162" rx="120" ry="16" fill="#1c1010" />
        </g>
      )}

      {/* small church */}
      {photo.church && (
        <g>
          <rect x="146" y="118" width="20" height="22" fill="#e8e2d8" />

          <rect x="158" y="92" width="2" height="14" fill="#a83a2a" />
          <rect x="156" y="84" width="6" height="2" fill="#a83a2a" />
          <rect x="158" y="84" width="2" height="6" fill="#a83a2a" />
        </g>
      )}

      {/* film-grain wash */}
      <rect width="300" height="200" fill="url(#grain)" opacity="0.06" />
    </svg>
  );
}

function GrainDefs() {
  // single shared filter defs node
  return (
    <svg width="0" height="0" style={{ position: "absolute" }} aria-hidden="true">
      <defs>
        <pattern id="grain" width="3" height="3" patternUnits="userSpaceOnUse">
          <rect width="3" height="3" fill="#000" />
          <rect width="1" height="1" fill="#fff" opacity="0.5" />

window.PhotoSVG = PhotoSVG;

  <script type="text/babel" data-presets="react">
// Metadater — main app (v2).
// Implements: theme switching, batch-edit master/scope model, append/replace caption,
// date/time/TZ editing, auto-save on selection change, fit/1:1 keyboard shortcuts.

const { useState, useMemo, useRef, useEffect, useCallback } = React;

// ── Tweak defaults ──────────────────────────────────────────────────────────
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "theme": "dark",
  "appState": "browsing",
  "thumbDensity": "m",
  "browserMode": "grid",
  "mapStyle": "topo"

// ── Date parsing / formatting ───────────────────────────────────────────────
function parseDate(str) {
  const m = String(str || "").match(/(\d{4})\s*\/\s*(\d{2})\s*\/\s*(\d{2}).*?(\d{2}):(\d{2})(?::(\d{2}))?/);
  if (!m) return { y: 2026, mo: 1, d: 1, h: 0, i: 0, s: 0 };
  return { y: +m[1], mo: +m[2], d: +m[3], h: +m[4], i: +m[5], s: +(m[6] || 0) };
}
function pad2(n) { return String(n).padStart(2, "0"); }
function fmtDate(d) {
  return `${d.y}/${pad2(d.mo)}/${pad2(d.d)} ${pad2(d.h)}:${pad2(d.i)}:${pad2(d.s)}`;
}
function shiftDate(d, deltaHours, deltaMinutes) {
  const js = new Date(Date.UTC(d.y, d.mo - 1, d.d, d.h, d.i, d.s));
  js.setUTCMinutes(js.getUTCMinutes() + deltaHours * 60 + deltaMinutes);
  return {
    y: js.getUTCFullYear(), mo: js.getUTCMonth() + 1, d: js.getUTCDate(),
    h: js.getUTCHours(), i: js.getUTCMinutes(), s: js.getUTCSeconds(),
  };
}

const TZ_OPTIONS = [
  "UTC+00:00 · Auto",
  "UTC+00:00 · Iceland",
  "UTC+00:00 · UK",
  "UTC+01:00 · CET",
  "UTC-05:00 · EST",
  "UTC-08:00 · PST",
  "UTC+05:30 · IST",
  "UTC+09:00 · JST",
];

function makeInitial(photos) {
  return Object.fromEntries(photos.map(p => [p.id, {
    headline: p.headline,
    caption: p.caption,
    keywords: [...p.keywords],
    date: parseDate(p.date),
    tz: "UTC+00:00 · Auto",
    lat: p.lat,
    lon: p.lon,
  }]));
}

// Parse a single coordinate (decimal or DMS) — used by paste parser.
// Returns array of {val, hem?} tokens for whatever it finds in the string.
function tokenizeCoords(s) {
  const dms = /([+-]?\d+(?:\.\d+)?)\s*(?:°|d|deg)\s*(?:(\d+(?:\.\d+)?)\s*(?:'|′|m\b))?\s*(?:(\d+(?:\.\d+)?)\s*(?:"|″|s\b))?\s*([NSEW])?/gi;
  const hasDmsMarkers = /[°'"′″NSEW]/i.test(s);
  if (hasDmsMarkers) {
    const tokens = [];
    let m;
    while ((m = dms.exec(s)) !== null) {
      const deg = parseFloat(m[1]);
      const min = parseFloat(m[2] || "0");
      const sec = parseFloat(m[3] || "0");
      const hem = m[4]?.toUpperCase();
      let val = Math.abs(deg) + min / 60 + sec / 3600;
      if (deg < 0) val = -val;
      if (hem === "S" || hem === "W") val = -Math.abs(val);
      else if (hem === "N" || hem === "E") val = Math.abs(val);
      if (!isNaN(val)) tokens.push({ val, hem });
    }
    return tokens;
  }
  // Decimal: split on commas / whitespace / semicolons
  return s.split(/[,;\s]+/)
    .map(x => parseFloat(x))
    .filter(n => !isNaN(n))
    .map(val => ({ val }));
}

// Parse a pasted string into { lat, lon } if a pair is detectable,
// or { single } if only one value is present.
function parseLatLonPair(s) {
  s = s.trim();
  if (!s) return null;
  const tokens = tokenizeCoords(s);
  if (!tokens.length) return null;
  if (tokens.length === 1) return { single: tokens[0].val };

  const [a, b] = tokens;
  const isLat = (t) => t.hem === "N" || t.hem === "S";
  const isLon = (t) => t.hem === "E" || t.hem === "W";
  let lat, lon;
  if (isLat(a) && isLon(b))      { lat = a.val; lon = b.val; }
  else if (isLat(b) && isLon(a)) { lat = b.val; lon = a.val; }
  else if (isLat(a))             { lat = a.val; lon = b.val; }
  else if (isLon(a))             { lon = a.val; lat = b.val; }
  else                           { lat = a.val; lon = b.val; }

  // Sanity swap if obviously reversed (lat > 90 means swapped)
  if (Math.abs(lat) > 90 && Math.abs(lon) <= 90) {
    const t = lat; lat = lon; lon = t;
  }
  return { lat, lon };
}

// ── Tiny inline icons ───────────────────────────────────────────────────────

  switch (name) {

    case "search":   return <svg width={s} height={s} viewBox="0 0 16 16"><circle {...stroke} cx="7" cy="7" r="4.5"/><path {...stroke} d="M10.5 10.5 L14 14"/></svg>;
    case "grid":     return <svg width={s} height={s} viewBox="0 0 16 16"><rect {...stroke} x="2.5" y="2.5" width="4.5" height="4.5"/><rect {...stroke} x="9" y="2.5" width="4.5" height="4.5"/><rect {...stroke} x="2.5" y="9" width="4.5" height="4.5"/><rect {...stroke} x="9" y="9" width="4.5" height="4.5"/></svg>;
    case "list":     return <svg width={s} height={s} viewBox="0 0 16 16"><path {...stroke} d="M3 4 H13 M3 8 H13 M3 12 H13"/></svg>;
    case "sort":     return <svg width={s} height={s} viewBox="0 0 16 16"><path {...stroke} d="M4 4 L4 13 M4 13 L2 11 M4 13 L6 11 M9 5 H13 M9 9 H12 M9 13 H10.5"/></svg>;
    case "more":     return <svg width={s} height={s} viewBox="0 0 16 16"><circle fill="currentColor" cx="3.5" cy="8" r="1.1"/><circle fill="currentColor" cx="8" cy="8" r="1.1"/><circle fill="currentColor" cx="12.5" cy="8" r="1.1"/></svg>;
    case "save":     return <svg width={s} height={s} viewBox="0 0 16 16"><path {...stroke} d="M3 3 H10 L13 6 V13 a0.5 0.5 0 0 1 -0.5 0.5 H3.5 a0.5 0.5 0 0 1 -0.5 -0.5 Z M5 3 V6 H10 V3 M5 10 H11 V13.5 H5 Z"/></svg>;
    case "stack":    return <svg width={s} height={s} viewBox="0 0 16 16"><rect {...stroke} x="2.5" y="6" width="11" height="7.5" rx="1"/><path {...stroke} d="M4 4.5 H12 M5 3 H11"/></svg>;
    case "wifi":     return <svg width={s} height={s} viewBox="0 0 16 16"><path {...stroke} d="M2 6 Q8 1 14 6 M4 9 Q8 5 12 9"/><circle fill="currentColor" cx="8" cy="12" r="1"/></svg>;
    case "battery":  return <svg width={s} height={s} viewBox="0 0 22 12"><rect {...stroke} x="0.5" y="1.5" width="18" height="9" rx="2"/><rect x="3" y="3" width="13" height="6" fill="currentColor"/><rect x="19.5" y="4" width="2" height="4" rx="1" fill="currentColor"/></svg>;
    case "spot":     return <svg width={s} height={s} viewBox="0 0 16 16"><circle {...stroke} cx="7" cy="7" r="4.5"/><path {...stroke} d="M10.5 10.5 L14 14"/></svg>;
    case "control":  return <svg width={s} height={s} viewBox="0 0 16 16"><rect {...stroke} x="2" y="3" width="5" height="10" rx="1"/><rect {...stroke} x="9" y="3" width="5" height="10" rx="1"/><circle fill="currentColor" cx="4.5" cy="9" r="1.2"/><circle fill="currentColor" cx="11.5" cy="6" r="1.2"/></svg>;
    case "check":    return <svg width={s} height={s} viewBox="0 0 16 16"><path {...stroke} d="M3 8 L7 12 L13 4"/></svg>;
    case "moon":     return <svg width={s} height={s} viewBox="0 0 16 16"><path {...stroke} d="M13 9.5 A5 5 0 1 1 6.5 3 A4 4 0 0 0 13 9.5 Z"/></svg>;
    case "sun":      return <svg width={s} height={s} viewBox="0 0 16 16"><circle {...stroke} cx="8" cy="8" r="3"/><path {...stroke} d="M8 1.5 V3 M8 13 V14.5 M1.5 8 H3 M13 8 H14.5 M3.5 3.5 L4.5 4.5 M11.5 11.5 L12.5 12.5 M3.5 12.5 L4.5 11.5 M11.5 4.5 L12.5 3.5"/></svg>;
    default: return null;
  }
};

// ── Browser ─────────────────────────────────────────────────────────────────
function Browser({ photos, selectedId, batchOrder, onSelect, onToggleBatch, mode, density, batchMode }) {
  const batchSet = useMemo(() => new Set(batchOrder), [batchOrder]);
  const masterId = batchOrder[0];

  if (mode === "list") {
    return (
      <div className="list-wrap">
        {photos.map(p => {
          const isSel = batchMode ? batchSet.has(p.id) : selectedId === p.id;
          const isMaster = batchMode && masterId === p.id;
          return (
            <div key={p.id} className={"list-row " + (isSel ? "selected" : "")}
                 onClick={(e) => batchMode || e.metaKey ? onToggleBatch(p.id) : onSelect(p.id)}>
              <div className="lthumb"><PhotoSVG photo={p}/></div>
              <div>
                <div className="lname">{p.file}{isMaster ? "  ⏵ master" : ""}</div>
                <div className="lmeta mono">{p.dim} · {p.size} · {p.iso} ISO</div>
              </div>
              <div className="lmeta mono">{p.aperture}</div>
            </div>
          );
        })}
      </div>
    );
  }
  return (
    <div className={"grid-wrap density-" + density}>
      {photos.map(p => {
        const isSel = batchMode ? batchSet.has(p.id) : selectedId === p.id;
        const inBatch = batchMode && batchSet.has(p.id);
        const isMaster = batchMode && masterId === p.id;
        const orderNum = batchMode && inBatch ? batchOrder.indexOf(p.id) + 1 : null;
        return (
          <div key={p.id}
               className={"thumb density-" + density + (isSel ? " selected" : "") + (inBatch ? " batch" : "")}
               onClick={(e) => batchMode || e.metaKey ? onToggleBatch(p.id) : onSelect(p.id)}>
            <PhotoSVG photo={p}/>
            {p.flag === "pick" && !batchMode && (
              <span className="badge flag" title="Flagged">✓</span>
            )}
            {batchMode && (
              <span className="badge flag" style={{ background: inBatch ? "var(--accent)" : "rgba(0,0,0,.55)", color: inBatch ? "var(--accent-fg)" : "rgba(255,255,255,.85)" }}>
                {orderNum != null ? (isMaster ? "M" : orderNum) : "+"}
              </span>
            )}
            {density !== "s" && (
              <span className="stamp mono">{p.id}</span>
            )}
          </div>
        );
      })}
    </div>
  );
}

// ── Preview pane ────────────────────────────────────────────────────────────

// ── Caption block (single) ──────────────────────────────────────────────────
function CaptionBlock({ headline, setHeadline, caption, setCaption }) {

  const hClass = hLen > 40 ? "over" : hLen >= 36 ? "warn" : "";

      <div className="headline-row">

// ── Date editor ─────────────────────────────────────────────────────────────
function DateEditor({ value, tz, onChange, onTzChange, locked }) {
  const upd = (k) => (e) => {
    const v = e.target.value.replace(/\D/g, "");
    if (locked) return;
    onChange({ ...value, [k]: +v || 0 });
  };
  return (
    <div className="date-editor">
      <input className="date-seg y" value={value.y} onChange={upd("y")} disabled={locked} maxLength={4} inputMode="numeric" />
      <span className="date-sep">/</span>
      <input className="date-seg m" value={pad2(value.mo)} onChange={upd("mo")} disabled={locked} maxLength={2} inputMode="numeric" />
      <span className="date-sep">/</span>
      <input className="date-seg d" value={pad2(value.d)} onChange={upd("d")} disabled={locked} maxLength={2} inputMode="numeric" />
      <span className="date-pad"></span>
      <input className="date-seg h" value={pad2(value.h)} onChange={upd("h")} disabled={locked} maxLength={2} inputMode="numeric" />
      <span className="date-sep">:</span>
      <input className="date-seg i" value={pad2(value.i)} onChange={upd("i")} disabled={locked} maxLength={2} inputMode="numeric" />
      <span className="date-sep">:</span>
      <input className="date-seg s" value={pad2(value.s)} onChange={upd("s")} disabled={locked} maxLength={2} inputMode="numeric" />
      <select className="date-tz" value={tz} onChange={(e) => !locked && onTzChange(e.target.value)} disabled={locked}>
        {TZ_OPTIONS.map(o => <option key={o} value={o}>{o}</option>)}
      </select>
    </div>
  );
}

function DateShift({ delta, setDelta }) {
  return (
    <div className="date-shift">
      <span>Shift all by</span>
      <input value={delta.hours} onChange={(e) => setDelta({ ...delta, hours: +e.target.value || 0 })} inputMode="numeric" />
      <span>h</span>
      <input value={delta.minutes} onChange={(e) => setDelta({ ...delta, minutes: +e.target.value || 0 })} inputMode="numeric" />
      <span>m</span>
      <span className="spacer" style={{ flex: 1 }}></span>
      <span className="faint mono" style={{ fontSize: 10 }}>preserves order</span>
    </div>
  );
}

// ── Keyword chips (single) ──────────────────────────────────────────────────
function KeywordChips({ keywords, setKeywords }) {
  const [draft, setDraft] = useState("");
  const inputRef = useRef(null);

  const commit = (raw) => {
    const parts = raw.split(",").map(s => s.trim()).filter(Boolean);
    if (!parts.length) return;
    const next = [...keywords];
    parts.forEach(p => { if (!next.includes(p.toLowerCase())) next.push(p.toLowerCase()); });
    setKeywords(next);
    setDraft("");
  };

  return (
    <div className="chips" onClick={() => inputRef.current?.focus()}>
      {keywords.map((k, i) => (
        <span key={k + i} className="chip">
          <span className="scope-dot"></span>
          {k}
          <span className="x" onClick={(e) => { e.stopPropagation(); setKeywords(keywords.filter((_, j) => j !== i)); }}>×</span>
        </span>
      ))}
      <input
        ref={inputRef}
        className="chip-input"
        value={draft}
        placeholder={keywords.length ? "Add…" : "Type a keyword, press , to add"}
        onChange={(e) => {
          const v = e.target.value;
          if (v.endsWith(",")) commit(v);
          else setDraft(v);
        }}
        onKeyDown={(e) => {
          if (e.key === "Enter") { e.preventDefault(); commit(draft); }
          if (e.key === "Backspace" && !draft && keywords.length) {
            setKeywords(keywords.slice(0, -1));
          }
        }}
      />
    </div>
  );
}

// ── Keyword chips (batch) ───────────────────────────────────────────────────
// Renders union of all selected images' keywords. Solid = in every image;
// dashed/faded = in some. X removes from all. Right-click context menu
// offers Add-to-all (for "some" chips) or Remove-from-all.
function BatchKeywordChips({ commonKeywords, someKeywords, onAddAll, onRemoveAll, onPromoteToAll }) {
  const [draft, setDraft] = useState("");
  const [menu, setMenu] = useState(null); // { x, y, key, scope }
  const inputRef = useRef(null);

  const commit = (raw) => {
    const parts = raw.split(",").map(s => s.trim().toLowerCase()).filter(Boolean);
    if (!parts.length) return;
    parts.forEach(p => onAddAll(p));
    setDraft("");
  };

  useEffect(() => {
    if (!menu) return;
    const close = () => setMenu(null);
    window.addEventListener("click", close);
    return () => window.removeEventListener("click", close);
  }, [menu]);

  const renderChip = (k, scope) => (
    <span key={scope + "-" + k} className={"chip" + (scope === "some" ? " some" : "")}
          onContextMenu={(e) => { e.preventDefault(); setMenu({ x: e.clientX, y: e.clientY, key: k, scope }); }}>
      <span className="scope-dot"></span>
      {k}
      <span className="x" onClick={(e) => { e.stopPropagation(); onRemoveAll(k); }}>×</span>
    </span>
  );

  return (
    <>
      <div className="chips" onClick={() => inputRef.current?.focus()}>
        {commonKeywords.map(k => renderChip(k, "all"))}
        {someKeywords.map(k => renderChip(k, "some"))}
        <input
          ref={inputRef}
          className="chip-input"
          value={draft}
          placeholder={(commonKeywords.length + someKeywords.length) ? "Add to all…" : "Add a keyword, press , to add to all"}
          onChange={(e) => {
            const v = e.target.value;
            if (v.endsWith(",")) commit(v);
            else setDraft(v);
          }}
          onKeyDown={(e) => {
            if (e.key === "Enter") { e.preventDefault(); commit(draft); }
          }}
        />
      </div>
      {menu && (
        <div className="chip-menu" style={{ left: menu.x, top: menu.y }} onClick={(e) => e.stopPropagation()}>
          {menu.scope === "some" && (
            <div className="item" onClick={() => { onPromoteToAll(menu.key); setMenu(null); }}>
              <Icon name="check" size={11}/> Add "{menu.key}" to all
            </div>
          )}
          <div className="item danger" onClick={() => { onRemoveAll(menu.key); setMenu(null); }}>
            Remove "{menu.key}" from all
          </div>
        </div>
      )}
    </>
  );
}

// ── Geo cells (lat + lon with inline hemisphere) ────────────────────────────
function formatCoord(v) {
  if (v == null || isNaN(v)) return "";
  return Math.abs(v).toFixed(4) + "°";
}

function GeoCells({ lat, lon, onChange }) {
  const [latStr, setLatStr] = useState(formatCoord(lat));
  const [lonStr, setLonStr] = useState(formatCoord(lon));
  useEffect(() => { setLatStr(formatCoord(lat)); }, [lat]);
  useEffect(() => { setLonStr(formatCoord(lon)); }, [lon]);

  const onPaste = (which) => (e) => {
    const text = e.clipboardData.getData("text");
    const parsed = parseLatLonPair(text);
    if (!parsed) return;
    e.preventDefault();
    if (parsed.lat != null && parsed.lon != null) {
      onChange({ lat: parsed.lat, lon: parsed.lon });
    } else if (parsed.single != null) {
      if (which === "lat") onChange({ lat: parsed.single, lon });
      else                 onChange({ lat, lon: parsed.single });
    }
  };

  const commit = (which) => () => {
    const str = which === "lat" ? latStr : lonStr;
    const cur = which === "lat" ? lat : lon;
    const v = parseFloat(str);
    if (isNaN(v)) {
      // reset display
      if (which === "lat") setLatStr(formatCoord(lat));
      else                 setLonStr(formatCoord(lon));
      return;
    }
    const signed = cur < 0 ? -Math.abs(v) : Math.abs(v);
    if (signed !== cur) {
      if (which === "lat") onChange({ lat: signed, lon });
      else                 onChange({ lat, lon: signed });
    } else {
      if (which === "lat") setLatStr(formatCoord(signed));
      else                 setLonStr(formatCoord(signed));
    }
  };

  const toggleSign = (which) => () => {
    // intentionally a no-op — hemisphere is a read-only label derived
    // from the value's sign. To flip hemisphere, type a leading "-".
  };

  return (
    <div className="geo-row">
      <div className="geo-cell">
        <input
          className="geo-input"
          value={latStr}
          onChange={(e) => setLatStr(e.target.value)}
          onPaste={onPaste("lat")}
          onBlur={commit("lat")}
          onKeyDown={(e) => { if (e.key === "Enter") { e.preventDefault(); commit("lat")(); e.target.blur(); } }}
          spellCheck={false}
        />
        <span className="hemi" title="Hemisphere — derived from sign">
          {lat >= 0 ? "N" : "S"}
        </span>
      </div>
      <div className="geo-cell">
        <input
          className="geo-input"
          value={lonStr}
          onChange={(e) => setLonStr(e.target.value)}
          onPaste={onPaste("lon")}
          onBlur={commit("lon")}
          onKeyDown={(e) => { if (e.key === "Enter") { e.preventDefault(); commit("lon")(); e.target.blur(); } }}
          spellCheck={false}
        />
        <span className="hemi" title="Hemisphere — derived from sign">
          {lon >= 0 ? "E" : "W"}
        </span>
      </div>
    </div>
  );
}

function MetaPanelBatch({ batchPhotos, batchImages, masterId, batchDraft, setBatchDraft, mapStyle, commonKeywords, someKeywords, onAddAll, onRemoveAll, onPromoteToAll }) {
  const master = batchImages[masterId];
  if (!master) return null;
  const dateCount = new Set(batchPhotos.map(p => `${batchImages[p.id].date.y}-${batchImages[p.id].date.mo}-${batchImages[p.id].date.d}`)).size;
  const locCount = new Set(batchPhotos.map(p => `${p.lat.toFixed(2)},${p.lon.toFixed(2)}`)).size;

  return (
    <div className="meta-panel">
      <div className="meta-scroll">
        <div className="section">
          <div className="section-title"><span>Selection</span><span className="edit">{batchPhotos.length}</span></div>
          <dl className="kv-list">
            <dt>Master</dt>     <dd>{batchPhotos[0]?.id}</dd>
            <dt>Date span</dt>  <dd>{dateCount === 1 ? "same day" : `${dateCount} dates`}</dd>
            <dt>Locations</dt>  <dd>{locCount} distinct</dd>
            <dt>Total size</dt> <dd>{batchPhotos.reduce((s, p) => s + parseFloat(p.size), 0).toFixed(1)} MB</dd>
          </dl>
        </div>

        <div className="section">
          <div className="section-title"><span>Captured (master)</span></div>
          <DateEditor
            value={master.date}
            tz={master.tz}
            onChange={(d) => setBatchDraft({ ...batchDraft, masterDate: d })}
            onTzChange={(tz) => setBatchDraft({ ...batchDraft, masterTz: tz })}
          />
          <DateShift delta={batchDraft.dateShift} setDelta={(d) => setBatchDraft({ ...batchDraft, dateShift: d })} />
        </div>

        <div className="section">
          <div className="section-title"><span>Location (master)</span></div>
          <div className="map">
            <MapView photo={batchPhotos[0]} style={mapStyle} />
            <MapPin dir={batchPhotos[0].dir} />
          </div>
          <GeoCells
            lat={batchImages[masterId].lat}
            lon={batchImages[masterId].lon}
            onChange={({lat, lon}) => setBatchDraft({ ...batchDraft, masterLat: lat, masterLon: lon })}
          />
          <PlaceLine place={locCount > 1 ? `${locCount - 1} other location${locCount > 2 ? "s" : ""} in selection` : batchPhotos[0].place} alt={batchPhotos[0].alt} />
        </div>

        <div className="section">
          <div className="section-title">
            <span>Keywords</span>
            <span className="edit mono">{commonKeywords.length} all · {someKeywords.length} some</span>

            <span className="scope-dot" style={{ display: "inline-block", marginRight: 4, background: "var(--accent)" }}></span>
            in all · <span style={{ opacity: 0.55 }}>◌</span> in some

        </div>
      </div>
    </div>
  );
}
